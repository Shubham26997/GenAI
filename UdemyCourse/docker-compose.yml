services:

  application:
    build: .
    container_name: "udemy_ai"
    command: tail -f /dev/null
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - udemy_network

  vector_db:
    image: qdrant/qdrant
    container_name: "vectore_qdrant_db"
    ports:
      - 6333:6333
    networks:
      - udemy_network
    volumes:
      - vector_db:/qdrant/storage

networks:
  udemy_network:
volumes:
  vector_db: