services:
  # Newsletter Application (Prefect Worker)
  application:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      # Worker MUST use internal service name 'server'
      - PREFECT_API_URL=http://prefect:4200/api
      - RECIPIENT_EMAIL=shubhamgoel386@gmail.com
    command: python create_deployment.py
    networks:
      - infra_network


networks:
  infra_network:
    external: true